name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run Application
        id: run_app
        continue-on-error: true
        run: |
          set +e

          OUTPUT=$(python app.py 2>&1)
          EXIT_CODE=$?

          echo "$OUTPUT"

          {
            echo "error<<EOF"
            echo "$OUTPUT"
            echo "EOF"
            echo "exit_code=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          exit $EXIT_CODE

      - name: Create or Update ARIA Case
        if: always() && steps.run_app.outcome == 'failure'
        env:
          ERROR_MSG: ${{ steps.run_app.outputs.error }}
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          set +e

          CORRELATION_ID="ARIA_MAIN2_PIPELINE_${{ github.ref_name }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          PIPELINE_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PIPELINE_NAME="ARIA_MAIN_PIPELINE"

          echo "================================================"
          echo "ARIA FAILURE HANDLER STARTED"
          echo "Correlation ID: $CORRELATION_ID"
          echo "Pipeline URL: $PIPELINE_URL"
          echo "ServiceNow Instance: $SN_INSTANCE"
          echo "================================================"

          echo "Testing ServiceNow connection..."

          TEST_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case?sysparm_limit=1" \
            -H "Accept: application/json")

          echo "Connection test response:"
          echo "$TEST_RESPONSE"

          echo "Checking existing ARIA case..."

          CASE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case?sysparm_query=u_external_id=$CORRELATION_ID&sysparm_limit=1" \
            -H "Accept: application/json")

          echo "Case search response:"
          echo "$CASE_RESPONSE"

          CASE_BODY=$(echo "$CASE_RESPONSE" | sed '/HTTP_STATUS:/d')
          CASE_SYS_ID=$(echo "$CASE_BODY" | jq -r '.result[0].sys_id // empty')

          if [ -z "$CASE_SYS_ID" ]; then
            echo "No existing case found. Creating new ARIA case..."

            CASE_PAYLOAD=$(jq -n \
              --arg state "work in progress" \
              --arg ext "$CORRELATION_ID" \
              --arg opened "$CURRENT_TIME" \
              --arg url "$PIPELINE_URL" \
              --arg short "GitHub Pipeline Failure - ${{ github.ref_name }}" \
              --arg desc "Pipeline execution failed. See related signal for detailed error." \
              --arg pipeline "ARIA_MAIN2_PIPELINE" \
              '{
                u_case_state: $state,
                u_external_id: $ext,
                u_opened_at: $opened,
                u_pipelineid: $pipeline,
                u_u: $url,
                u_situation_summary: $short,
                u_situation_details: $desc
              }')

            echo "Case payload:"
            echo "$CASE_PAYLOAD"

            CREATE_CASE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$CASE_PAYLOAD")

            echo "Create case response:"
            echo "$CREATE_CASE_RESPONSE"

            CREATE_CASE_BODY=$(echo "$CREATE_CASE_RESPONSE" | sed '/HTTP_STATUS:/d')
            CASE_SYS_ID=$(echo "$CREATE_CASE_BODY" | jq -r '.result.sys_id // empty')

            if [ -z "$CASE_SYS_ID" ]; then
              echo "ARIA case was not created. Check the ServiceNow response above."
              exit 0
            fi

            echo "ARIA case created successfully. Sys ID: $CASE_SYS_ID"

            echo "Creating ARIA signal record..."

            SIGNAL_PAYLOAD=$(jq -n \
              --arg case_id "$CASE_SYS_ID" \
              --arg src "GitHub" \
              --arg type "pipeline failure" \
              --arg ext "$CORRELATION_ID" \
              --arg status "active" \
              --arg err "$ERROR_MSG" \
              '{
                u_case: $case_id,
                u_signal_source: $src,
                u_signal_type: $type,
                u_external_id: $ext,
                u_status: $status,
                u_error: $err
              }')

            echo "Signal payload:"
            echo "$SIGNAL_PAYLOAD"

            CREATE_SIGNAL_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_signal_source" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$SIGNAL_PAYLOAD")

            echo "Create signal response:"
            echo "$CREATE_SIGNAL_RESPONSE"

          else
            echo "Existing case found. Updating case: $CASE_SYS_ID"

            UPDATE_CASE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case/$CASE_SYS_ID" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$(jq -n \
                --arg state "monitoring" \
                --arg url "$PIPELINE_URL" \
                --arg pipeline "ARIA_MAIN2_PIPELINE" \
                --arg short "Pipeline still failing" \
                --arg desc "Pipeline still failing - monitoring" \
                '{
                  u_case_state: $state,
                  u_pipelineid: $pipeline,
                  u_u: $url,
                  u_situation_summary: $short,
                  u_situation_details: $desc
                }')")

            echo "Update case response:"
            echo "$UPDATE_CASE_RESPONSE"
          fi

          echo "ARIA failure handling completed."

      - name: Close ARIA Case
        if: always() && steps.run_app.outcome == 'success'
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          CORRELATION_ID="ARIA_MAIN2_PIPELINE_${{ github.ref_name }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")

          echo "Pipeline successful. Checking ARIA case for closure..."

          CASE_RESPONSE=$(curl -s \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case?sysparm_query=u_external_id=$CORRELATION_ID&sysparm_limit=1" \
            -H "Accept: application/json")

          echo "$CASE_RESPONSE"

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result[0].sys_id // empty')

          if [ -n "$CASE_SYS_ID" ]; then
            CLOSE_RESPONSE=$(curl -s \
              -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/x_1974103_aria_u_aria_case/$CASE_SYS_ID" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$(jq -n \
                --arg state "closed" \
                --arg closed "$CURRENT_TIME" \
                --arg short "Pipeline successful" \
                --arg desc "Pipeline execution completed successfully." \
                '{
                  u_case_state: $state,
                  u_closedat: $closed,
                  u_situation_summary: $short,
                  u_situation_details: $desc
                }')")

            echo "$CLOSE_RESPONSE"
          else
            echo "No ARIA case found for closure."
          fi

      - name: Mark Pipeline Failed
        if: always() && steps.run_app.outcome == 'failure'
        run: |
          echo "Application failed, marking pipeline as failed after ARIA handling."
          exit 1
